<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="index.css" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script type="text/javascript">
//<![CDATA[

function loadQueryParameters () {
	const parametersString = window.location.search.substr(1);
	const parametersArray = parametersString.split("&");
	const parameters = {};
	for (var parameterIndex = 0; parameterIndex < parametersArray.length; parameterIndex++) {
		const [key, value] = parametersArray[parameterIndex].split("=", 2);
		parameters[key] = value;
	}
	console.log(JSON.stringify(parameters, null, 2));
	document.getElementById("table").value = parameters["table"];
	document.getElementById("seat").value = parameters["seat"];
	document.getElementById("singers").value = parameters["singers"] || "";
}

//]]>
		</script>
	</head>
	<body onload="loadQueryParameters()">
		<header>
			<h1>Karaoké</h1>
		</header>
		<main>
			<form action="https://automation.orion-elenion.net/webhook/karaoke/wish" method="post">
				<fieldset>
					<input type="hidden" name="table" id="table" required="" />
					<input type="hidden" name="seat" id="seat" required="" />
					<label for="wish">Que veux-tu chanter&#160;?</label>
					<input name="wish" id="wish" type="text" required placeholder="Ma chanson - Son interprète" />
					<label for="singers">Qui va chanter&#160;?</label>
					<input name="singers" id="singers" type="text" required placeholder="Mon nom" />
					<label for="notes">Quelque chose à ajouter&#160;?</label>
					<textarea name="notes" id="notes" placeholder="Je vais bientôt partir, je veux une version précise, etc."></textarea>
				</fieldset>
				<fieldset class="buttons">
					<button type="submit">Valider</button>
					<button type="cancel">Annuler</button>
				</fieldset>
			</form>
		</main>
	</body>
</html>
